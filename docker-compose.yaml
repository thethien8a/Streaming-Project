services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: data_source
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "wal_level=logical"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d data_source"]
      start_period: 15s
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: quay.io/debezium/kafka:2.5
    ports:
      - "29092:29092"
    environment:
      - CLUSTER_ID=4L6Np67psS769p968P7yEA
      - NODE_ID=1
      - NODE_ROLE=combined
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://kafka:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
    volumes:
      - kafka_data:/kafka/data
    healthcheck:
      test: /kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1
      start_period: 30s
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # One-shot service: pre-creates Kafka topics BEFORE Flink jobs start, eliminating
  # the UnknownTopicOrPartitionException race when one Flink job reads a topic that
  # another Flink job has not yet produced to.
  kafka-init:
    image: quay.io/debezium/kafka:2.5
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -e
        echo "Creating Kafka topics..."
        # upsert-kafka sink REQUIRES log compaction so the latest value per key is retained
        /kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic processed.enriched_transactions \
          --partitions 1 --replication-factor 1 \
          --config cleanup.policy=compact \
          --config min.cleanable.dirty.ratio=0.1 \
          --config segment.ms=60000
        # Aggregation topic: standard 7-day retention
        /kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic processed.merchant_revenue_1min \
          --partitions 1 --replication-factor 1 \
          --config retention.ms=604800000
        echo "Topics created. Listing:"
        /kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
    restart: "no"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
    healthcheck:
      test: curl -f http://localhost:8081/subjects || exit 1
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  connect:
    build: ./src/debezium
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_GROUP_ID: 1
      CONNECT_CONFIG_STORAGE_TOPIC: my_connect_configs
      CONNECT_OFFSET_STORAGE_TOPIC: my_connect_offsets
      CONNECT_STATUS_STORAGE_TOPIC: my_connect_statuses
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME=debezium
      - KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS=http://connect:8083
      - KAFKA_CLUSTERS_0_SCHEMAREGISTRY=http://schema-registry:8081
    depends_on:
      - kafka
      - connect
      - schema-registry
    restart: unless-stopped

  flink-jobmanager:
    build: ./src/flink
    command: jobmanager
    ports:
      - "8085:8081"
    environment:
      # POSTGRES_* are referenced as ${...} in init.sql for the JDBC dimension lookups.
      # The JAR's main() runs on the JobManager, so substitution reads from this container.
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:[REDACTED:password]}
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: rocksdb
        state.checkpoints.dir: file:///opt/flink/checkpoints
        state.savepoints.dir: file:///opt/flink/savepoints
        execution.checkpointing.interval: 10s
    volumes:
      - flink_data:/opt/flink/data
      - flink_checkpoints:/opt/flink/checkpoints
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      # JDBC lookup join targets postgres at runtime; require it healthy before start.
      postgres:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://localhost:8081/overview || exit 1
      start_period: 30s
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  flink-taskmanager:
    build: ./src/flink
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: rocksdb
        state.checkpoints.dir: file:///opt/flink/checkpoints
        state.savepoints.dir: file:///opt/flink/savepoints
    volumes:
      - flink_data:/opt/flink/data
      - flink_checkpoints:/opt/flink/checkpoints
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    restart: unless-stopped

  flink-sql-client:
    build: ./src/flink
    command: /opt/flink/bin/sql-client.sh 
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
        rest.port: 8081
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    stdin_open: true
    tty: true
    profiles:
      - flink-sql

  flink-job-submitter:
    build: ./src/flink/job-submitter
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    environment:
      JOBMANAGER_URL: http://flink-jobmanager:8081
    profiles:
      - submit-jobs
  
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"   # HTTP interface (client port)
      - "9000:9000"   # Native TCP
      - "9009:9009"   # Inter-server (node to node communication)
    environment:
      CLICKHOUSE_DB: streaming
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      # - ./src/clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: wget -qO- http://localhost:8123/ping || exit 1
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  kafka_data:
  flink_data:
  flink_checkpoints:
  clickhouse_data:
  clickhouse_logs: